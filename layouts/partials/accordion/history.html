<div class="relative border-l-2 border-gray-400 dark:border-gray-600 ml-3 mt-2">
  {{ range hugo.Data.history.list }}
  <div class="mb-6 ml-6">
    <span class="absolute -left-[9px] mt-1 h-4 w-4 rounded-full border-2 border-blue-500 dark:border-yellow-500 bg-white dark:bg-gray-900"></span>
    <time class="text-sm font-semibold text-blue-600 dark:text-yellow-500">{{ .dates }}</time>
    <h4 class="mt-1 font-semibold text-gray-800 dark:text-gray-100">
      {{ if .url }}
      <a href="{{ .url }}" target="_blank" class="hover:underline">{{ .event }}</a>
      {{ else }}
      {{ .event }}
      {{ end }}
    </h4>
    {{ if .details }}
    <p class="mt-1 text-sm text-gray-600 dark:text-gray-400">{{ .details | markdownify }}</p>
    {{ end }}
  </div>
  {{ end }}
</div>
